services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: stopanddance
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: stopanddance_production
    restart: unless-stopped
    networks:
      - app_network

  web:
    build: .
    depends_on:
      - db
    environment:
      RAILS_ENV: production
      APP_DATABASE_PASSWORD: ${DB_PASSWORD}
      APP_DATABASE_HOST: db
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ALERT_EMAIL: ${ALERT_EMAIL}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      PLAUSIBLE_API_KEY: ${PLAUSIBLE_API_KEY}
      PLAUSIBLE_SITE_ID: ${PLAUSIBLE_SITE_ID:-stopand.dance}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    volumes:
      - ./log:/rails/log
      - ~/.claude:/root/.claude  # Claude CLI auth persistence
    restart: unless-stopped
    networks:
      - app_network

  jobs:
    build: .
    depends_on:
      - db
    environment:
      RAILS_ENV: production
      APP_DATABASE_PASSWORD: ${DB_PASSWORD}
      APP_DATABASE_HOST: db
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      PLAUSIBLE_API_KEY: ${PLAUSIBLE_API_KEY}
      PLAUSIBLE_SITE_ID: ${PLAUSIBLE_SITE_ID:-stopand.dance}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    command: bundle exec rake solid_queue:start
    volumes:
      - ./log:/rails/log
      - ~/.claude:/root/.claude  # Claude CLI needed for scraping jobs
    restart: unless-stopped
    networks:
      - app_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app_network

  # Plausible Analytics (self-hosted)
  plausible_db:
    image: postgres:16
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
      POSTGRES_USER: plausible
      POSTGRES_DB: plausible_db
    restart: unless-stopped
    networks:
      - app_network

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - ./docker/clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./docker/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    networks:
      - app_network

  plausible:
    image: ghcr.io/plausible/community-edition:v3.0.1
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events_db
    environment:
      BASE_URL: https://stats.stopand.dance
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      TOTP_VAULT_KEY: ${PLAUSIBLE_TOTP_VAULT_KEY}
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible_db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
      DISABLE_REGISTRATION: invite_only
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  plausible_db_data:
  plausible_events_data:

networks:
  app_network:
    driver: bridge
